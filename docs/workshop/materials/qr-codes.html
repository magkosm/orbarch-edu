<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orbital Architecture — Workshop QR Codes (A4, printable)</title>
  <style>
    @page { size: A4 portrait; margin: 12mm; }
    * { box-sizing: border-box; }
    body { font-family: Arial, Helvetica, sans-serif; color: #111; margin: 16px; }
    h1 { font-size: 19px; margin: 0 0 2px; }
    .sub { color: #555; font-size: 12px; margin-bottom: 14px; }
    .controls { margin-bottom: 14px; }
    button { padding: 8px 14px; border: 1px solid #ccc; border-radius: 6px; background: #f3f3f3; cursor: pointer; font-size: 13px; }
    .page { page-break-after: always; }
    .page:last-child { page-break-after: auto; }
    h2 { font-size: 16px; border-bottom: 2px solid #111; padding-bottom: 4px; margin: 8px 0 12px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10mm 8mm; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 8px; text-align: center; break-inside: avoid; }
    .card img { width: 58mm; height: 58mm; image-rendering: pixelated; }
    .card .name { font-weight: bold; font-size: 13px; margin-top: 4px; }
    .card .url { font-size: 9.5px; color: #555; word-break: break-all; }
    @media print { .controls { display: none; } body { margin: 0; } }
  </style>
</head>
<body>
  <h1>Orbital Architecture — Workshop QR Codes</h1>
  <div class="sub">A4, one page per language. Images are local (no internet needed). Scan with a phone camera.</div>
  <div class="controls"><button onclick="window.print()">🖨️ Print</button></div>
  <div id="root"></div>

  <script>
    var LANGS = [{ code: 'en', name: 'English' }, { code: 'sv', name: 'Svenska' }, { code: 'el', name: 'Ελληνικά' }];
    var BASE = 'https://magkosm.github.io/orbarch-edu';
    var TOOLS = [
      { key: 'reaction-default', path: '/reaction-default', label: { en: 'Reaction Time', sv: 'Reaktionstid', el: 'Χρόνος αντίδρασης' } },
      { key: 'matb-2min', path: '/2min', label: { en: 'MATB (2-min)', sv: 'MATB (2 min)', el: 'MATB (2 λεπτά)' } },
      { key: 'condition-lab', path: '/condition-lab', label: { en: 'Condition Lab', sv: 'Förhållandelabb', el: 'Εργαστήριο Συνθηκών' } },
      { key: 'simulator', path: '/simulator', label: { en: 'Simulator', sv: 'Simulator', el: 'Προσομοιωτής' } },
      { key: 'blueprint', path: '/blueprint', label: { en: 'Blueprint Designer', sv: 'Ritningsdesigner', el: 'Σχεδιαστής Κάτοψης' } },
      { key: 'model-lab', path: '/model-lab', label: { en: 'Model Lab', sv: 'Modellabb', el: 'Εργαστήριο Μοντέλου' } },
      { key: 'hub', path: '/', label: { en: 'Main hub', sv: 'Startmeny', el: 'Κύριο μενού' } }
    ];
    var root = document.getElementById('root');
    LANGS.forEach(function (lang) {
      var page = document.createElement('div');
      page.className = 'page';
      var h2 = document.createElement('h2');
      h2.textContent = lang.name + '  (?lng=' + lang.code + ')';
      page.appendChild(h2);
      var grid = document.createElement('div');
      grid.className = 'grid';
      TOOLS.forEach(function (tool) {
        var url = BASE + tool.path + '?lng=' + lang.code;
        var card = document.createElement('div');
        card.className = 'card';
        card.innerHTML =
          '<img alt="QR ' + tool.label[lang.code] + '" src="qr/' + tool.key + '-' + lang.code + '.png">' +
          '<div class="name">' + tool.label[lang.code] + '</div>' +
          '<div class="url">' + url + '</div>';
        grid.appendChild(card);
      });
      page.appendChild(grid);
      root.appendChild(page);
    });
  </script>
</body>
</html>
