<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Orbital Architecture — Workshop QR Codes (A4, one per page)</title>
  <style>
    @page { size: A4 portrait; margin: 12mm; }
    * { box-sizing: border-box; }
    body { font-family: Arial, Helvetica, sans-serif; color: #111; margin: 0; }
    .controls {
      position: sticky; top: 0; background: #fff; border-bottom: 1px solid #ddd;
      padding: 12px 16px; display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
    }
    .controls strong { font-size: 14px; }
    .langbtn { padding: 8px 16px; border: 1px solid #bbb; border-radius: 20px; background: #f3f3f3; cursor: pointer; font-size: 14px; }
    .langbtn.active { background: #1f6feb; color: #fff; border-color: #1f6feb; }
    .print { margin-left: auto; padding: 8px 16px; border: 1px solid #ccc; border-radius: 6px; background: #f3f3f3; cursor: pointer; font-size: 14px; }
    .hint { font-size: 12px; color: #666; }

    .page {
      width: 100%; min-height: 273mm; /* ~A4 height minus margins */
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; page-break-after: always; padding: 10mm 0;
    }
    .page:last-child { page-break-after: auto; }
    .page .name { font-size: 40px; font-weight: bold; margin-bottom: 8mm; }
    .page img { width: 150mm; height: 150mm; image-rendering: pixelated; }
    .page .url { font-size: 16px; color: #333; margin-top: 8mm; word-break: break-all; }
    .page .step { font-size: 16px; color: #666; margin-top: 4mm; }

    @media print {
      .controls { display: none; }
      .page { min-height: 273mm; }
    }
  </style>
</head>
<body>
  <div class="controls">
    <strong>Language:</strong>
    <button class="langbtn" data-lang="en">English</button>
    <button class="langbtn" data-lang="sv">Svenska</button>
    <button class="langbtn" data-lang="el">Ελληνικά</button>
    <span class="hint">One QR per A4 page — printing gives one code per sheet.</span>
    <button class="print" onclick="window.print()">🖨️ Print</button>
  </div>
  <div id="root"></div>

  <script>
    var BASE = 'https://magkosm.github.io/orbarch-edu';
    var TOOLS = [
      { key: 'reaction-default', path: '/reaction-default', label: { en: 'Reaction Time', sv: 'Reaktionstid', el: 'Χρόνος αντίδρασης' } },
      { key: 'matb-2min', path: '/2min', label: { en: 'MATB — 2 min', sv: 'MATB — 2 min', el: 'MATB — 2 λεπτά' } },
      { key: 'condition-lab', path: '/condition-lab', label: { en: 'Condition Lab', sv: 'Förhållandelabb', el: 'Εργαστήριο Συνθηκών' } },
      { key: 'simulator', path: '/simulator', label: { en: 'Architecture Simulator', sv: 'Arkitektursimulator', el: 'Προσομοιωτής Αρχιτεκτονικής' } },
      { key: 'blueprint', path: '/blueprint', label: { en: 'Blueprint Designer', sv: 'Ritningsdesigner', el: 'Σχεδιαστής Κάτοψης' } },
      { key: 'model-lab', path: '/model-lab', label: { en: 'Model Lab', sv: 'Modellabb', el: 'Εργαστήριο Μοντέλου' } },
      { key: 'hub', path: '/', label: { en: 'Main hub', sv: 'Startmeny', el: 'Κύριο μενού' } }
    ];
    var SCAN = { en: 'Scan to open', sv: 'Skanna för att öppna', el: 'Σκανάρετε για άνοιγμα' };
    var root = document.getElementById('root');

    function render(lang) {
      root.innerHTML = '';
      TOOLS.forEach(function (tool) {
        var url = BASE + tool.path + '?lng=' + lang;
        var page = document.createElement('div');
        page.className = 'page';
        page.innerHTML =
          '<div class="name">' + tool.label[lang] + '</div>' +
          '<img alt="QR ' + tool.label[lang] + '" src="qr/' + tool.key + '-' + lang + '.png">' +
          '<div class="step">' + SCAN[lang] + '</div>' +
          '<div class="url">' + url + '</div>';
        root.appendChild(page);
      });
      document.querySelectorAll('.langbtn').forEach(function (b) {
        b.classList.toggle('active', b.getAttribute('data-lang') === lang);
      });
      document.documentElement.lang = lang;
    }

    document.querySelectorAll('.langbtn').forEach(function (b) {
      b.addEventListener('click', function () { render(b.getAttribute('data-lang')); });
    });
    render('en');
  </script>
</body>
</html>
